<!--
  [INPUT]: 依赖 assets/index-Coy5B0kA.css 与 assets/index-BezMjCv7.js 提供原 3D 个人主页前端，依赖 docs/2026-05-23-我的月球-3d个人主页二创参赛项目-spec.md 的“原前端为主体 + AI 系统叠加”方向
  [OUTPUT]: 对外提供原 3D 互动广场作为主体页面，并叠加“我的月球”AI 系统监控与调度覆盖层
  [POS]: 仓库根目录运行入口，负责启动历史 bundle 并挂接当前黑客松 AI 系统前端
  [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="我的月球：沿用原有 3D 可交互前端，并叠加 AI 生命支持调度系统。"
    />
    <title>龙铠Loongarm | AI驱动的模块化月球家园DIY计划</title>
    <link
      rel="preload"
      as="image"
      href="./assets/images/circus-tent.png"
      imagesrcset="./assets/images/circus-tent.png 1x"
    />
    <link rel="stylesheet" href="./assets/index-Coy5B0kA.css" />
    <link rel="stylesheet" href="./assets/my-moon-overlay.css" />
  </head>
  <body>
    <div id="root"></div>

    <section class="moon-ai-shell" aria-label="我的月球 AI 系统">
      <button class="moon-ai-launcher" id="moonAiLauncher" type="button" aria-expanded="false">
        AI SYSTEM
      </button>

      <div class="moon-ai-dashboard is-collapsed" id="moonAiDashboard">
        <aside class="moon-ai-panel moon-ai-summary" aria-label="系统总览">
          <div class="moon-ai-kicker">My Moon</div>
          <h1>我的月球</h1>
          <p class="moon-ai-lead" id="moonAiLead">
            原有 3D 场景保持可交互探索，AI 系统负责生命支持调度演示。
          </p>

          <div class="moon-ai-metrics">
            <article class="moon-ai-metric">
              <span>系统模式</span>
              <strong id="modeText">normal</strong>
              <div class="moon-ai-bar"><i id="modeBar"></i></div>
            </article>
            <article class="moon-ai-metric">
              <span>太阳输入</span>
              <strong id="solarText">100%</strong>
              <div class="moon-ai-bar"><i id="solarBar"></i></div>
            </article>
            <article class="moon-ai-metric">
              <span>储能余量</span>
              <strong id="batteryText">72%</strong>
              <div class="moon-ai-bar"><i id="batteryBar"></i></div>
            </article>
            <article class="moon-ai-metric">
              <span>生命支持</span>
              <strong id="lifeText">100%</strong>
              <div class="moon-ai-bar"><i id="lifeBar"></i></div>
            </article>
          </div>
        </aside>

        <aside class="moon-ai-panel moon-ai-control" aria-label="AI 协同层">
          <div class="moon-ai-header">
            <div>
              <span class="moon-ai-label">AI 协同层</span>
              <strong id="dockText">未并网</strong>
            </div>
            <span class="moon-ai-chip" id="scenarioText">巡检待命</span>
          </div>

          <p class="moon-ai-copy" id="aiCopy">
            保留原广场交互作为空间主体；AI 系统独立演示能源接入与生命支持调度。
          </p>

          <div class="moon-ai-actions">
            <button id="dockButton" type="button">接入能源舱</button>
            <button id="eventButton" type="button" disabled>启动遮挡事件</button>
            <button id="doorButton" type="button" disabled>打开双门</button>
            <button id="resetButton" type="button">恢复稳定</button>
          </div>

          <section class="moon-ai-lighting" aria-label="模型调参控制台">
            <div class="moon-ai-lighting-head">
              <div class="moon-ai-log-title">模型控制台</div>
              <button id="moonLightingSave" type="button">保存参数</button>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="centerpiece">
              <strong>中间大模型</strong>
              <label>亮度 <output id="moonLightingCenterpieceBrightnessValue">1.00x</output></label>
              <input id="moonLightingCenterpieceBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingCenterpieceColor" type="color" value="#d8e7ff" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="medical">
              <strong>医疗仓</strong>
              <label>亮度 <output id="moonLightingMedicalBrightnessValue">1.00x</output></label>
              <input id="moonLightingMedicalBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingMedicalColor" type="color" value="#8ea2ff" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="communication">
              <strong>通信仓</strong>
              <label>亮度 <output id="moonLightingCommunicationBrightnessValue">1.00x</output></label>
              <input id="moonLightingCommunicationBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingCommunicationColor" type="color" value="#8ea2ff" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="research">
              <strong>科研仓</strong>
              <label>亮度 <output id="moonLightingResearchBrightnessValue">1.00x</output></label>
              <input id="moonLightingResearchBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingResearchColor" type="color" value="#8ea2ff" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="energy">
              <strong>能源仓</strong>
              <label>亮度 <output id="moonLightingEnergyBrightnessValue">1.00x</output></label>
              <input id="moonLightingEnergyBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingEnergyColor" type="color" value="#8ea2ff" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="shop">
              <strong>种植仓</strong>
              <label>亮度 <output id="moonLightingShopBrightnessValue">1.00x</output></label>
              <input id="moonLightingShopBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingShopColor" type="color" value="#a8f0cf" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="guide">
              <strong>居住仓</strong>
              <label>亮度 <output id="moonLightingGuideBrightnessValue">1.00x</output></label>
              <input id="moonLightingGuideBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingGuideColor" type="color" value="#ffe0a8" /></label>
            </div>

            <div class="moon-ai-lighting-grid" data-lighting-group="player">
              <strong>用户操作居住仓</strong>
              <label>亮度 <output id="moonLightingPlayerBrightnessValue">1.00x</output></label>
              <input id="moonLightingPlayerBrightness" type="range" min="0" max="8" step="0.05" value="1" />
              <label>颜色 <input id="moonLightingPlayerColor" type="color" value="#9aa7ff" /></label>
            </div>

            <p class="moon-ai-save-status" id="moonLightingSaveStatus">未保存</p>
          </section>

          <div class="moon-ai-log">
            <div class="moon-ai-log-title">系统播报</div>
            <ul id="moonAiLog"></ul>
          </div>
        </aside>

        <aside class="moon-ai-strip" aria-label="传播链">
          <article>
            <span>发电功率</span>
            <strong id="generationText">80.0 EU/s</strong>
          </article>
          <article>
            <span>电池压力</span>
            <strong id="stressText">8%</strong>
          </article>
          <article>
            <span>当前负载</span>
            <strong id="demandText">90 EU/s</strong>
          </article>
          <article>
            <span>居住舱风险</span>
            <strong id="riskText">18%</strong>
          </article>
        </aside>
      </div>
    </section>

    <script src="./assets/my-moon-runtime-config.js"></script>
    <script type="module" src="./assets/index-BezMjCv7.js"></script>
    <script src="./assets/my-moon-overlay.js"></script>
  </body>
</html>
